<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis — PlaySync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1923;
      --bg-mid:      #141f2e;
      --bg-panel:    #1a2535;
      --bg-card:     #1e2d3d;
      --bg-item:     #243447;
      --border:      #243040;
      --border-light:#2d3f55;
      --text:        #ffffff;
      --text-sec:    #8ba3be;
      --text-muted:  #4a6278;
      --run:         #e53935;
      --run-bg:      rgba(229,57,53,0.18);
      --pass:        #2196f3;
      --pass-bg:     rgba(33,150,243,0.18);
      --success:     #22c55e;
      --warn:        #f59e0b;
      --danger:      #ef4444;
      --accent:      #ff6b00;
      --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ──────────────────────────── */
    #topbar {
      height: 56px;
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }

    .logo-icon {
      width: 28px; height: 28px;
      background: #004992;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px;
    }

    .main-nav { display: flex; gap: 2px; margin-left: 12px; }

    .nav-link {
      padding: 0 10px; height: 30px;
      display: flex; align-items: center;
      font-weight: 700; font-size: 12px; letter-spacing: 1px;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 6px;
      transition: color .15s;
    }

    .nav-link:hover  { color: var(--text); }
    .nav-link.active { color: #00c896; }

    /* Score + situation on the right of topbar */
    .tb-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .tb-score {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .tb-team-name {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .tb-score-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .tb-sep {
      font-size: 14px;
      color: var(--text-muted);
      padding-bottom: 2px;
    }

    .tb-situation {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      padding-left: 10px;
      border-left: 1px solid var(--border);
    }

    .tb-quarter {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .tb-down-field {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sec);
      white-space: nowrap;
    }

    /* ── Tab bar ─────────────────────────── */
    .tab-bar {
      display: flex;
      background: var(--bg-mid);
      border-bottom: 2px solid var(--border);
      padding: 0 16px;
      position: sticky;
      top: 56px;
      z-index: 90;
    }

    .tab-btn {
      padding: 10px 18px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color .2s;
    }

    .tab-btn:hover { color: var(--text-sec); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Refresh bar ─────────────────────── */
    .refresh-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 4px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Page layout ─────────────────────── */
    .page {
      padding: 14px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .col-full { grid-column: 1 / -1; }

    @media (max-width: 580px) {
      .tab-panel.active { grid-template-columns: 1fr; }
      .col-full { grid-column: 1; }
    }

    /* ── Card ────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .card-head {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-sec);
    }

    .card-body { padding: 14px; }

    /* ── Success rate card ───────────────── */
    .success-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      gap: 16px;
    }

    .success-big {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .success-big.good { color: var(--success); }
    .success-big.mid  { color: var(--warn); }
    .success-big.bad  { color: var(--danger); }

    .success-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .success-fraction {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sec);
      margin-top: 4px;
    }

    .success-bar-track {
      flex: 1;
      height: 8px;
      background: var(--bg-item);
      border-radius: 4px;
      overflow: hidden;
      min-width: 60px;
    }

    .success-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
    }

    /* ── Run/Pass ratio ──────────────────── */
    .ratio-section { display: flex; flex-direction: column; gap: 14px; }
    .ratio-divider { height: 1px; background: var(--border); }
    .ratio-row { display: flex; flex-direction: column; gap: 6px; }

    .ratio-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .ratio-numbers {
      display: flex;
      align-items: baseline;
      gap: 0;
      flex-wrap: wrap;
    }

    .ratio-num {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .ratio-num.run  { color: var(--run); }
    .ratio-num.pass { color: var(--pass); }

    .ratio-type {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 10px 0 4px;
      align-self: flex-end;
      padding-bottom: 5px;
    }

    .ratio-pct {
      font-size: 12px;
      color: var(--text-sec);
      margin-left: auto;
      align-self: flex-end;
      padding-bottom: 4px;
    }

    .bar-track {
      height: 9px;
      background: var(--bg-item);
      border-radius: 5px;
      overflow: hidden;
      display: flex;
    }

    .bar-run  { background: var(--run);  height: 100%; transition: width .4s ease; }
    .bar-pass { background: var(--pass); height: 100%; transition: width .4s ease; }

    /* ── Tendency table ──────────────────── */
    .tend-table { width: 100%; border-collapse: collapse; }

    .tend-table th {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 7px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .tend-table th:first-child { text-align: left; }

    .tend-table td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
    }

    .tend-table td:first-child {
      text-align: left;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sec);
      border-right: 1px solid var(--border-light);
      min-width: 40px;
    }

    .tend-table tr:last-child td { border-bottom: none; }
    .tend-table td:last-child     { border-right: none; }

    .cell-type { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; }
    .cell-type.run   { color: var(--run); }
    .cell-type.pass  { color: var(--pass); }
    .cell-type.empty { color: var(--text-muted); }
    .cell-yds  { font-size: 10px; color: var(--text-sec);   margin-top: 2px; }
    .cell-cnt  { font-size: 9px;  color: var(--text-muted); margin-top: 1px; }

    /* ── Defensive tendency cell items ──── */
    .def-cell { display: flex; flex-direction: column; gap: 0; text-align: left; }
    .def-cell-section { display: flex; flex-direction: column; gap: 1px; padding: 3px 0; }
    .def-cell-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .def-cell-name { font-size: 9px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .def-cell-pct  { font-size: 9px; font-weight: 800; flex-shrink: 0; }
    .def-cell-sep  { height: 1px; background: var(--border); margin: 1px 0; }

    /* ── Defense usage grid ─────────────────── */
    .def-usage-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .def-section {
      padding: 12px;
      border-right: 1px solid var(--border);
    }

    .def-section:last-child { border-right: none; }

    .def-section-title {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    @media (max-width: 500px) {
      .def-usage-grid { grid-template-columns: 1fr; }
      .def-section { border-right: none; border-bottom: 1px solid var(--border); }
      .def-section:last-child { border-bottom: none; }
    }

    /* ── Analysis table (formations + concepts) ── */
    .analysis-table { width: 100%; border-collapse: collapse; }

    .analysis-table th {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 12px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .analysis-table th:first-child { text-align: left; }

    .analysis-table td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-sec);
      vertical-align: middle;
    }

    .analysis-table td:first-child {
      text-align: left;
      font-weight: 700;
      color: var(--text);
    }

    .analysis-table tr:last-child > td { border-bottom: none; }

    .at-pct { font-weight: 800; }
    .at-pct.good { color: var(--success); }
    .at-pct.mid  { color: var(--warn); }
    .at-pct.bad  { color: var(--danger); }

    /* ── Expand/collapse rows ─────────────── */
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px 8px;
      font-size: 16px;
      border-radius: 4px;
      transition: color .15s, background .15s;
      line-height: 1;
    }

    .expand-btn:hover { color: var(--text); background: var(--bg-item); }
    .expand-btn.open  { color: var(--accent); }

    .detail-row { display: none; }
    .detail-row.open { display: table-row; }

    .detail-cell {
      padding: 0 !important;
      border-bottom: 1px solid var(--border);
    }

    .detail-inner {
      background: var(--bg-mid);
      border-top: 1px solid var(--border-light);
      overflow-x: auto;
    }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 11px; }

    .detail-table th {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-align: left;
    }

    .detail-table td {
      padding: 7px 10px;
      color: var(--text-sec);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
      text-align: left;
    }

    .detail-table tr:last-child td { border-bottom: none; }

    .result-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .result-tag.success { background: rgba(34,197,94,.15); color: var(--success); }
    .result-tag.failure { background: rgba(239,68,68,.12);  color: var(--danger); }

    /* ── Defense killers ─────────────────── */
    .killer-row {
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }

    .killer-row:last-child { border-bottom: none; }

    .killer-rank-row { display: flex; align-items: center; gap: 6px; }

    .killer-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--danger);
      opacity: 0.6;
      min-width: 14px;
    }

    .killer-combo { font-size: 12px; font-weight: 700; color: var(--danger); }

    .killer-bar-track {
      height: 4px;
      background: var(--bg-item);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }

    .killer-bar-fill {
      height: 100%;
      background: var(--danger);
      border-radius: 2px;
      transition: width .4s ease;
    }

    .killer-stats { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .killer-count { font-size: 10px; color: var(--text-muted); }
    .killer-avg   { font-size: 10px; color: var(--danger); opacity: 0.8; }

    /* ── OPP placeholder ─────────────────── */
    .opp-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
    }

    .opp-placeholder-icon  { font-size: 44px; opacity: .2; }
    .opp-placeholder-title { font-size: 16px; font-weight: 700; color: var(--text-sec); }
    .opp-placeholder-sub   { font-size: 12px; max-width: 240px; line-height: 1.6; }

    /* ── Empty / no-game states ──────────── */
    .empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 20px 12px;
    }

    .no-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
    }

    .no-game-icon  { font-size: 52px; opacity: 0.25; }
    .no-game-title { font-size: 17px; font-weight: 700; color: var(--text-sec); }
    .no-game-sub   { font-size: 13px; max-width: 260px; line-height: 1.5; }

    /* ── Print ───────────────────────────── */
    .print-header { display: none; }
    .print-only   { display: none; }

    #print-btn {
      background: none;
      border: 1px solid var(--border-light);
      border-radius: 5px;
      color: var(--text-sec);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    #print-btn:hover { color: var(--text); border-color: var(--text-sec); }

    @media print {
      @page { size: letter portrait; margin: 0.3in; }

      /* Redefine color tokens → grayscale */
      :root {
        --bg: #fff; --bg-mid: #fff; --bg-panel: #fff;
        --bg-card: #fff; --bg-item: #f0f0f0;
        --border: #bbb; --border-light: #ccc;
        --text: #000; --text-sec: #333; --text-muted: #666;
        --run: #000; --pass: #444; --success: #000;
        --warn: #333; --danger: #000; --accent: #000;
      }

      body { background: #fff !important; font-size: 8px; }

      /* Hide screen-only elements */
      #topbar, .tab-bar, .refresh-bar,
      .expand-btn, .detail-row,
      .success-bar-track, .bar-track, .killer-bar-track,
      .no-print { display: none !important; }

      /* Show print-only elements */
      .print-header { display: block !important; }

      /* Force OWN panel visible with compact 2-col grid */
      .tab-panel[data-panel="own"] {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      .page { padding: 0; gap: 5px; max-width: 100%; }

      .card {
        background: #fff !important;
        border: 1px solid #bbb !important;
        border-radius: 3px !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .card-head  { padding: 3px 7px !important; border-bottom: 1px solid #bbb !important; }
      .card-title { font-size: 6.5px !important; letter-spacing: 0.08em; color: #555 !important; }
      .card-body  { padding: 5px 7px !important; }

      /* Success card */
      .success-card     { padding: 5px 10px !important; gap: 6px !important; }
      .success-big      { font-size: 22px !important; color: #000 !important; }
      .success-label    { font-size: 6.5px !important; color: #666 !important; }
      .success-fraction { font-size: 9px !important; color: #333 !important; margin-top: 2px !important; }

      /* Run/Pass */
      .ratio-section { gap: 5px !important; }
      .ratio-num     { font-size: 18px !important; color: #000 !important; }
      .ratio-type    { font-size: 7px !important; }
      .ratio-pct     { font-size: 8px !important; }
      .ratio-label   { font-size: 6.5px !important; }
      .ratio-divider { margin: 2px 0 !important; }

      /* Tables */
      .tend-table th, .tend-table td { padding: 3px 5px !important; font-size: 7.5px !important; }
      .analysis-table th, .analysis-table td { padding: 2px 7px !important; font-size: 7.5px !important; }
      .cell-type  { font-size: 8px !important; }
      .cell-yds   { font-size: 7px !important; }
      .cell-cnt   { font-size: 6.5px !important; }

      /* Defense cells */
      .def-cell-name, .def-cell-pct { font-size: 7px !important; }
      .def-cell-section { padding: 1px 0 !important; }
      .def-section      { padding: 5px 7px !important; }
      .def-section-title { font-size: 6.5px !important; margin-bottom: 3px !important; }

      /* Killer rows */
      .killer-row { padding: 3px 7px !important; }
      .killer-combo { font-size: 8px !important; color: #000 !important; }
      .killer-count, .killer-avg { font-size: 7px !important; color: #555 !important; }

      /* Result tags */
      .result-tag { border: 1px solid #999 !important; background: none !important; color: #000 !important; }

      /* at-pct colors → black */
      .at-pct { color: #000 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    'use strict';

    const GAMES_KEY   = 'playsync_games';
    const CURRENT_KEY = 'playsync_current_game_id';

    // ── Data loading ──────────────────────────────────────────────────────────

    function loadState() {
      try {
        const id = localStorage.getItem(CURRENT_KEY);
        if (!id) return null;
        const games = JSON.parse(localStorage.getItem(GAMES_KEY) || '[]');
        const game  = games.find(g => g.id === id);
        if (!game || !game.state) return null;
        return game.state;
      } catch (_) { return null; }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Returns own-possession plays only; falls back to including all if no
    // play has a mode field (older saves).
    function ownPlays(history) {
      const hasModes = history.some(p => p.mode);
      if (!hasModes) return history;
      return history.filter(p => p.mode === 'own');
    }

    // Proper success rate: down-based yardage thresholds
    function isSuccess(p) {
      const gained = p.yardsGained || 0;
      const needed = p.toFirst     || 10;
      const down   = p.down        || 1;
      const r      = (p.result     || '').toLowerCase();

      // Explicit positive results
      if (['td', 'touchdown', 'first', 'first-down', 'first_down', '1st down'].includes(r)) return true;
      // Explicit failure results
      if (['incomplete', 'tfl', 'turnover', 'sack', 'punt'].includes(r)) return false;

      // Down-based thresholds
      if (down === 1) return gained >= needed * 0.5;
      if (down === 2) return gained >= needed * 0.6;
      return gained >= needed; // 3rd & 4th: must convert
    }

    // oppYardLine → { side: 'OPP'|'OWN', num: number }
    function parseYardLine(v) {
      if (v <= 50) return { side: 'OPP', num: v };
      return { side: 'OWN', num: 100 - v };
    }

    function distBucket(toFirst) {
      if (toFirst <= 3) return 0;
      if (toFirst <= 7) return 1;
      return 2;
    }

    const DOWN_LABELS = ['1ST', '2ND', '3RD', '4TH'];
    const DOWN_WORDS  = ['', '1st', '2nd', '3rd', '4th'];

    // ── Compute functions ─────────────────────────────────────────────────────

    function computeRatio(plays) {
      const run  = plays.filter(p => p.type === 'run').length;
      const pass = plays.filter(p => p.type === 'pass').length;
      return { run, pass, total: run + pass };
    }

    function computeTendencies(plays) {
      const grid = Array.from({ length: 4 }, () =>
        Array.from({ length: 3 }, () => ({ run: 0, pass: 0, runYards: 0, passYards: 0, n: 0 }))
      );
      plays.forEach(p => {
        const r = (p.down || 1) - 1;
        if (r < 0 || r > 3) return;
        const c    = distBucket(p.toFirst || 10);
        const cell = grid[r][c];
        const yds  = p.yardsGained || 0;
        if (p.type === 'run') { cell.run++; cell.runYards  += yds; }
        else                  { cell.pass++; cell.passYards += yds; }
        cell.n++;
      });
      return grid;
    }

    function computeOverallSuccess(plays) {
      if (!plays.length) return { rate: 0, ok: 0, total: 0 };
      let ok = 0;
      plays.forEach(p => { if (isSuccess(p)) ok++; });
      return { rate: Math.round(ok / plays.length * 100), ok, total: plays.length };
    }

    function computeFormationsTable(plays) {
      const map = {};
      plays.forEach(p => {
        const name = p.formationName || '—';
        if (!map[name]) map[name] = { name, ok: 0, n: 0, yards: 0 };
        map[name].n++;
        map[name].yards += p.yardsGained || 0;
        if (isSuccess(p)) map[name].ok++;
      });
      return Object.values(map)
        .map(f => ({ ...f,
          avg: f.n ? +(f.yards / f.n).toFixed(1) : 0,
          pct: f.n ? Math.round(f.ok / f.n * 100) : 0
        }))
        .sort((a, b) => b.pct - a.pct);
    }

    function computeConcepts(plays) {
      const map = {};
      plays.forEach(p => {
        const key = (p.playName || '—') + '|||' + (p.formationName || '—');
        if (!map[key]) map[key] = {
          play: p.playName || '—',
          formation: p.formationName || '—',
          ok: 0, n: 0, yards: 0, instances: []
        };
        map[key].n++;
        map[key].yards += p.yardsGained || 0;
        if (isSuccess(p)) map[key].ok++;
        map[key].instances.push(p);
      });
      return Object.values(map)
        .map(c => ({ ...c,
          avg: c.n ? +(c.yards / c.n).toFixed(1) : 0,
          pct: c.n ? Math.round(c.ok / c.n * 100) : 0
        }))
        .sort((a, b) => b.pct - a.pct);
    }

    function computeKillers(plays) {
      const map = {};
      plays.forEach(p => {
        if ((p.yardsGained || 0) > 0) return;
        const front    = p.selectedFront    || '';
        const coverage = p.selectedCoverage || '';
        if (!front && !coverage) return;
        const key = [front, coverage].filter(Boolean).join(' / ');
        if (!map[key]) map[key] = { combo: key, n: 0, yards: 0 };
        map[key].n++;
        map[key].yards += p.yardsGained || 0;
      });
      return Object.values(map)
        .sort((a, b) => b.n - a.n)
        .slice(0, 3);
    }

    function computeDefUsage(plays) {
      const fronts = {}, blitzes = {}, coverages = {};
      plays.forEach(p => {
        const yds = p.yardsGained || 0;
        const ok  = isSuccess(p);
        function tally(map, key) {
          if (!key) return;
          if (!map[key]) map[key] = { name: key, n: 0, yards: 0, ok: 0 };
          map[key].n++;
          map[key].yards += yds;
          if (ok) map[key].ok++;
        }
        tally(fronts,    p.selectedFront    || '');
        tally(blitzes,   p.selectedBlitz    || '');
        tally(coverages, p.selectedCoverage || '');
      });
      const toArr = map => Object.values(map)
        .map(v => ({ ...v,
          avg: v.n ? +(v.yards / v.n).toFixed(1) : 0,
          pct: v.n ? Math.round(v.ok / v.n * 100) : 0
        }))
        .sort((a, b) => b.n - a.n);
      return { fronts: toArr(fronts), blitzes: toArr(blitzes), coverages: toArr(coverages) };
    }

    function computeDefTendencies(plays) {
      const grid = Array.from({ length: 4 }, () =>
        Array.from({ length: 3 }, () => ({ fronts: {}, blitzes: {}, coverages: {}, n: 0 }))
      );
      plays.forEach(p => {
        const r = (p.down || 1) - 1;
        if (r < 0 || r > 3) return;
        const c    = distBucket(p.toFirst || 10);
        const cell = grid[r][c];
        cell.n++;
        function tally(map, key) { if (key) map[key] = (map[key] || 0) + 1; }
        tally(cell.fronts,    p.selectedFront    || '');
        tally(cell.blitzes,   p.selectedBlitz    || '');
        tally(cell.coverages, p.selectedCoverage || '');
      });
      return grid;
    }

    // ── Render helpers ────────────────────────────────────────────────────────

    function defUsageHTML(data) {
      function miniTable(title, rows) {
        if (!rows.length) return `
          <div class="def-section">
            <div class="def-section-title">${title}</div>
            <div class="empty" style="padding:8px 0;font-size:11px;">Sin datos</div>
          </div>`;
        const body = rows.map(r => {
          const cls = r.pct >= 60 ? 'good' : r.pct >= 40 ? 'mid' : 'bad';
          const avgStr = r.avg > 0 ? `+${r.avg}` : `${r.avg}`;
          return `<tr>
            <td>${esc(r.name)}</td>
            <td>${r.n}</td>
            <td>${avgStr}</td>
            <td><span class="at-pct ${cls}">${r.pct}%</span></td>
          </tr>`;
        }).join('');
        return `
          <div class="def-section">
            <div class="def-section-title">${title}</div>
            <table class="analysis-table" style="font-size:12px;">
              <thead><tr><th>Nombre</th><th>N</th><th>Avg</th><th>Éxito</th></tr></thead>
              <tbody>${body}</tbody>
            </table>
          </div>`;
      }
      const hasAny = data.fronts.length || data.blitzes.length || data.coverages.length;
      if (!hasAny) return `<div class="empty">Sin datos de defensiva registrados</div>`;
      return `<div class="def-usage-grid">
        ${miniTable('Fronts', data.fronts)}
        ${miniTable('Blitzes', data.blitzes)}
        ${miniTable('Coverages', data.coverages)}
      </div>`;
    }

    function defTendencyTableHTML(grid) {
      const COLS = ['CORTO ≤3', 'MEDIO 4–7', 'LARGO 8+'];

      function sectionHTML(map, total, colorVar) {
        const entries = Object.entries(map)
          .filter(([k]) => k)
          .sort((a, b) => b[1] - a[1]);
        if (!entries.length) return '';
        return `<div class="def-cell-section">${
          entries.map(([k, n]) => {
            const pct = Math.round(n / total * 100);
            return `<div class="def-cell-item">
              <span class="def-cell-name" style="color:${colorVar};">${esc(k)}</span>
              <span class="def-cell-pct" style="color:${colorVar};opacity:.75;">${pct}%</span>
            </div>`;
          }).join('')
        }</div>`;
      }

      let html = `<table class="tend-table"><thead><tr>
        <th></th>${COLS.map(c => `<th>${c}</th>`).join('')}
      </tr></thead><tbody>`;

      grid.forEach((row, ri) => {
        html += `<tr><td>${DOWN_LABELS[ri]}</td>`;
        row.forEach(cell => {
          if (cell.n === 0) {
            html += `<td><span class="cell-type empty">—</span></td>`;
          } else {
            const fHtml = sectionHTML(cell.fronts,    cell.n, 'var(--text)');
            const bHtml = sectionHTML(cell.blitzes,   cell.n, 'var(--warn)');
            const cHtml = sectionHTML(cell.coverages, cell.n, 'var(--pass)');
            const sep   = '<div class="def-cell-sep"></div>';
            const parts = [fHtml, bHtml, cHtml].filter(Boolean);
            html += `<td>
              <div class="def-cell">
                ${parts.join(sep)}
                <div class="cell-cnt" style="margin-top:3px;">${cell.n}j</div>
              </div>
            </td>`;
          }
        });
        html += `</tr>`;
      });

      return html + `</tbody></table>`;
    }

    function ratioRowHTML(label, r) {
      if (r.total === 0) {
        return `<div class="ratio-row">
          <div class="ratio-label">${label}</div>
          <div class="empty" style="padding:8px 0;text-align:left;color:var(--text-muted);font-size:12px;">Sin jugadas</div>
        </div>`;
      }
      const rPct = Math.round(r.run  / r.total * 100);
      const pPct = 100 - rPct;
      return `<div class="ratio-row">
        <div class="ratio-label">${label}</div>
        <div class="ratio-numbers">
          <span class="ratio-num run">${r.run}</span>
          <span class="ratio-type">RUN</span>
          <span class="ratio-num pass">${r.pass}</span>
          <span class="ratio-type">PASS</span>
          <span class="ratio-pct">${rPct}% / ${pPct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-run"  style="width:${rPct}%"></div>
          <div class="bar-pass" style="width:${pPct}%"></div>
        </div>
      </div>`;
    }

    function tendencyTableHTML(grid) {
      const COLS = ['CORTO ≤3', 'MEDIO 4–7', 'LARGO 8+'];
      let html = `<table class="tend-table"><thead><tr>
        <th></th>${COLS.map(c => `<th>${c}</th>`).join('')}
      </tr></thead><tbody>`;

      grid.forEach((row, ri) => {
        html += `<tr><td>${DOWN_LABELS[ri]}</td>`;
        row.forEach(cell => {
          if (cell.n === 0) {
            html += `<td><span class="cell-type empty">—</span></td>`;
          } else {
            const runPct  = Math.round(cell.run  / cell.n * 100);
            const passPct = 100 - runPct;
            const runAvg  = cell.run  ? (cell.runYards  / cell.run).toFixed(1)  : '—';
            const passAvg = cell.pass ? (cell.passYards / cell.pass).toFixed(1) : '—';
            html += `<td>
              <div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">
                <span class="cell-type run">${runPct}%</span>
                <span class="cell-type" style="color:var(--text-muted);font-weight:400;">/</span>
                <span class="cell-type pass">${passPct}%</span>
              </div>
              <div class="cell-yds" style="margin-top:3px;">
                <span style="color:var(--run);">${runAvg}</span>
                <span style="color:var(--text-muted);font-size:8px;"> R </span>
                <span style="color:var(--pass);">${passAvg}</span>
                <span style="color:var(--text-muted);font-size:8px;"> P</span>
              </div>
              <div class="cell-cnt">${cell.n}j</div>
            </td>`;
          }
        });
        html += `</tr>`;
      });

      return html + `</tbody></table>`;
    }

    function successCardHTML(s) {
      if (s.total === 0) {
        return `<div class="success-card"><div class="empty" style="padding:8px 0;">Sin jugadas registradas</div></div>`;
      }
      const cls  = s.rate >= 60 ? 'good' : s.rate >= 40 ? 'mid' : 'bad';
      const fill = s.rate >= 60 ? 'var(--success)' : s.rate >= 40 ? 'var(--warn)' : 'var(--danger)';
      return `<div class="success-card">
        <div>
          <div class="success-label">Tasa de Éxito Global</div>
          <div class="success-big ${cls}">${s.rate}%</div>
          <div class="success-fraction">${s.ok} de ${s.total} jugadas</div>
        </div>
        <div class="success-bar-track">
          <div class="success-bar-fill" style="width:${s.rate}%;background:${fill};"></div>
        </div>
      </div>`;
    }

    function formationsTableHTML(rows) {
      if (!rows.length) return `<div class="empty">Sin jugadas registradas</div>`;
      const body = rows.map(f => {
        const cls = f.pct >= 60 ? 'good' : f.pct >= 40 ? 'mid' : 'bad';
        return `<tr>
          <td>${esc(f.name)}</td>
          <td>${f.n}</td>
          <td>${f.yards}</td>
          <td>${f.avg}</td>
          <td><span class="at-pct ${cls}">${f.pct}%</span></td>
        </tr>`;
      }).join('');
      return `<table class="analysis-table">
        <thead><tr>
          <th>Formación</th><th>N</th><th>Total Yds</th><th>Avg Yds</th><th>Éxito %</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>`;
    }

    function conceptsTableHTML(concepts) {
      if (!concepts.length) return `<div class="empty">Sin jugadas registradas</div>`;

      const rows = concepts.map((c, idx) => {
        const id  = `concept-${idx}`;
        const cls = c.pct >= 60 ? 'good' : c.pct >= 40 ? 'mid' : 'bad';

        const detailRows = c.instances.map(p => {
          const ok = isSuccess(p);
          // yardDisplay: positive = opp territory, negative = own territory
          const yd = p.yardDisplay != null ? p.yardDisplay : 0;
          const ylStr = yd >= 0 ? `OPP ${yd}` : `OWN ${Math.abs(yd)}`;
          return `<tr>
            <td>${p.down || '—'}</td>
            <td>${p.toFirst || '—'}</td>
            <td>${ylStr}</td>
            <td>${p.yardsGained != null ? p.yardsGained : '—'}</td>
            <td><span class="result-tag ${ok ? 'success' : 'failure'}">${esc(p.result || (ok ? 'Éxito' : 'Fallo'))}</span></td>
            <td>${p.playerNumber != null ? p.playerNumber : '—'}</td>
            <td>${esc(p.selectedFront    || '—')}</td>
            <td>${esc(p.selectedBlitz    || '—')}</td>
            <td>${esc(p.selectedCoverage || '—')}</td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.notes || '')}</td>
          </tr>`;
        }).join('');

        return `<tr>
            <td>${esc(c.play)}</td>
            <td style="color:var(--text-muted);font-size:12px;">${esc(c.formation)}</td>
            <td>${c.n}</td>
            <td>${c.yards}</td>
            <td>${c.avg}</td>
            <td><span class="at-pct ${cls}">${c.pct}%</span></td>
            <td><button class="expand-btn" data-target="${id}">&#8964;</button></td>
          </tr>
          <tr class="detail-row" id="${id}">
            <td class="detail-cell" colspan="7">
              <div class="detail-inner">
                <table class="detail-table">
                  <thead><tr>
                    <th>Down</th><th>Distance</th><th>Yardline</th><th>Yds</th>
                    <th>Resultado</th><th>#</th><th>Front</th><th>Blitz</th><th>Cob.</th><th>Notas</th>
                  </tr></thead>
                  <tbody>${detailRows}</tbody>
                </table>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `<table class="analysis-table" id="concepts-table">
        <thead><tr>
          <th>Jugada</th><th>Formación</th><th>N</th><th>Total Yds</th><th>Avg Yds</th><th>Éxito %</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function killersHTML(killers) {
      if (!killers.length) return `<div class="empty">Sin combinaciones registradas</div>`;
      const maxN = killers[0].n;
      return killers.map((k, i) => {
        const avg  = (k.yards / k.n).toFixed(1);
        const barW = Math.round(k.n / maxN * 100);
        return `<div class="killer-row">
          <div class="killer-rank-row">
            <span class="killer-num">${i + 1}</span>
            <span class="killer-combo">${esc(k.combo)}</span>
          </div>
          <div class="killer-bar-track">
            <div class="killer-bar-fill" style="width:${barW}%"></div>
          </div>
          <div class="killer-stats">
            <span class="killer-count">${k.n} vez${k.n !== 1 ? 'es' : ''}</span>
            <span class="killer-avg">${avg} yds avg</span>
          </div>
        </div>`;
      }).join('');
    }

    // ── Event wiring ──────────────────────────────────────────────────────────

    function attachConceptExpanders() {
      const tbl = document.getElementById('concepts-table');
      if (!tbl) return;
      tbl.addEventListener('click', function(e) {
        const btn = e.target.closest('.expand-btn');
        if (!btn) return;
        const id  = btn.dataset.target;
        const row = document.getElementById(id);
        if (!row) return;
        const isOpen = row.classList.contains('open');
        // Collapse all (accordion)
        tbl.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
        tbl.querySelectorAll('.expand-btn.open').forEach(b => b.classList.remove('open'));
        if (!isOpen) {
          row.classList.add('open');
          btn.classList.add('open');
        }
      });
    }

    function attachTabSwitcher() {
      const bar = document.querySelector('.tab-bar');
      if (!bar) return;
      bar.addEventListener('click', function(e) {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`);
        if (panel) panel.classList.add('active');
      });
    }

                  <div style="font-size:9px;color:#555;margin-top:1px;">${esc(state.teamHome)} ${state.scoreHome} — ${esc(state.teamAway)} ${state.scoreAway} &nbsp;·&nbsp; ${quarter} &nbsp;·&nbsp; ${downStr} &nbsp;·&nbsp; ${own.length} jugadas</div>
                </div>
                <div style="font-size:8px;color:#777;">Analysis OWN &nbsp;·&nbsp; ${new Date().toLocaleDateString('es-MX')}</div>
              </div>
            </div>

            <!-- Col 1: Success rate -->
            <div class="card">
              <div class="card-head">
                <span class="card-title">Efectividad Ofensiva</span>
              </div>
              ${successCardHTML(overallSuccess)}
            </div>

            <!-- Col 2: Run/Pass ratio -->
            <div class="card">
              <div class="card-head">
                <span class="card-title">Run / Pass</span>
              </div>
              <div class="card-body ratio-section">
                ${ratioRowHTML('Drive actual', driveRatio)}
                <div class="ratio-divider"></div>
                ${ratioRowHTML('Partido completo', gameRatio)}
              </div>
            </div>

            <!-- Col 1: Tendencias ofensivas -->
            <div class="card">
              <div class="card-head">
                <span class="card-title">Tendencias por Down y Distancia</span>
              </div>
              <div class="card-body" style="padding:0;">
                ${tendencyTableHTML(tendencies)}
              </div>
            </div>

            <!-- Col 2: Defense tendencies by down/distance -->
            <div class="card">
              <div class="card-head">
                <span class="card-title">Defensiva Rival por Down y Distancia</span>
              </div>
              <div class="card-body" style="padding:0;">
                ${defTendencyTableHTML(defTend)}
              </div>
            </div>

            <!-- Full width: Defense usage -->
            <div class="card col-full">
              <div class="card-head">
                <span class="card-title">Defensiva Rival — Front / Blitz / Coverage</span>
              </div>
              ${defUsageHTML(defUsage)}
            </div>

            <!-- Col 1: Formations -->
            <div class="card">
              <div class="card-head">
                <span class="card-title">Formaciones</span>
              </div>
              <div class="card-body" style="padding:0;">
                ${formationsTableHTML(formationsTable)}
              </div>
            </div>

            <!-- Col 2: Defense killers -->
            <div class="card no-print">
              <div class="card-head">
                <span class="card-title">Te han detenido</span>
              </div>
              ${killersHTML(killers)}
            </div>

            <!-- Full width: Concepts/plays table -->
            <div class="card col-full no-print">
              <div class="card-head">
                <span class="card-title">Conceptos y Jugadas</span>
              </div>
              <div class="card-body" style="padding:0;">
                ${conceptsTableHTML(concepts)}
              </div>
            </div>

          </div>

          <!-- OPP TAB -->
          <div class="tab-panel" data-panel="opp">
            <div class="card">
              <div class="opp-placeholder">
                <div class="opp-placeholder-icon">🔭</div>
                <div class="opp-placeholder-title">Próximamente</div>
                <div class="opp-placeholder-sub">El análisis del rival estará disponible en una próxima versión.</div>
              </div>
            </div>
          </div>

        </div>
      `;

      // Wire interactivity
      attachConceptExpanders();
      attachTabSwitcher();

      // Restore active tab
      const tabBtn = document.querySelector(`.tab-btn[data-tab="${activeTab}"]`);
      if (tabBtn) tabBtn.click();
      else document.querySelector('.tab-btn[data-tab="own"]').click();

      // Restore open concept row
      if (openConcept) {
        const row = document.getElementById(openConcept);
        if (row) {
          row.classList.add('open');
          const btn = document.querySelector(`.expand-btn[data-target="${openConcept}"]`);
          if (btn) btn.classList.add('open');
        }
      }
    }

    render();
    setInterval(render, 8000);
  </script>
</body>
</html>
