<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Admin — PlaySync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --bg-panel:  #141416;
      --bg-card:   #1c1c1f;
      --bg-item:   #242428;
      --border:    rgba(255,255,255,.08);
      --text:      #f0f0f2;
      --text-sec:  #a0a0a8;
      --text-muted:#606068;
      --accent:    #00C896;
      --danger:    #e53935;
      --warn:      #f5a623;
      --r-sm:      6px;
      --r-md:      10px;
      --font:      -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    html, body {
      min-height: 100%; background: var(--bg);
      color: var(--text); font-family: var(--font);
    }

    button { cursor: pointer; border: none; background: none;
             font-family: var(--font); color: var(--text); }
    input  { font-family: var(--font); }

    /* ── PIN screen ── */
    .pin-root {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }
    .pin-title {
      font-size: 20px; font-weight: 900;
      margin-bottom: 6px;
    }
    .pin-sub {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 28px;
    }
    .pin-card {
      width: 100%; max-width: 340px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .pin-input {
      width: 100%; height: 52px;
      padding: 0 16px; text-align: center;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 24px; font-weight: 800;
      letter-spacing: .3em;
      margin-bottom: 8px;
      transition: border-color .15s;
    }
    .pin-input:focus { outline: none; border-color: var(--accent); }
    .pin-input.error { border-color: var(--danger); }
    .pin-error {
      font-size: 12px; color: var(--danger);
      min-height: 18px; margin-bottom: 14px;
      text-align: center; font-weight: 600;
    }
    .pin-btn {
      width: 100%; height: 48px;
      background: var(--accent); color: #000;
      font-size: 14px; font-weight: 800;
      border-radius: var(--r-md);
    }
    .pin-back {
      margin-top: 16px;
      font-size: 13px; color: var(--text-muted);
      text-align: center; cursor: pointer;
      text-decoration: underline;
    }

    /* ── Admin panel ── */
    .admin-root { display: none; flex-direction: column; min-height: 100dvh; }
    .admin-root.show { display: flex; }

    .admin-topbar {
      height: 52px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
      flex-shrink: 0;
    }
    .admin-topbar-title {
      font-size: 15px; font-weight: 800; flex: 1;
    }
    .admin-topbar-badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(245,166,35,.15);
      color: var(--warn);
      border: 1px solid rgba(245,166,35,.3);
    }
    .admin-logout-btn {
      font-size: 12px; color: var(--text-muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
    }

    .admin-content {
      flex: 1; padding: 20px 16px;
      max-width: 640px; margin: 0 auto; width: 100%;
    }

    /* ── Section ── */
    .admin-section { margin-bottom: 28px; }
    .admin-section-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px;
    }

    /* ── Create team card ── */
    .create-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
    }
    .create-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .create-input {
      flex: 1; height: 44px; padding: 0 12px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text); font-size: 15px;
      font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase;
      transition: border-color .15s;
    }
    .create-input:focus { outline: none; border-color: var(--accent); }
    .create-input::placeholder {
      text-transform: none; font-weight: 400;
      letter-spacing: 0; font-size: 13px;
      color: var(--text-muted);
    }
    .create-btn {
      height: 44px; padding: 0 18px;
      background: var(--accent); color: #000;
      font-size: 13px; font-weight: 800;
      border-radius: var(--r-sm);
      white-space: nowrap;
    }
    .create-hint {
      font-size: 11px; color: var(--text-muted);
      line-height: 1.5;
    }
    .create-error {
      font-size: 12px; color: var(--danger);
      min-height: 16px; font-weight: 600;
    }

    /* ── Teams list ── */
    .teams-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .team-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .team-row-logo {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900;
      flex-shrink: 0; overflow: hidden;
      background: var(--bg-item);
      color: var(--text-muted);
    }
    .team-row-logo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .team-row-info { flex: 1; min-width: 0; }
    .team-row-code {
      font-size: 14px; font-weight: 800;
      letter-spacing: .08em;
    }
    .team-row-name {
      font-size: 12px; color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-row-badges {
      display: flex; gap: 5px; flex-shrink: 0;
    }
    .badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 3px;
    }
    .badge-configured {
      background: rgba(0,200,150,.12);
      color: var(--accent);
      border: 1px solid rgba(0,200,150,.2);
    }
    .badge-pending {
      background: rgba(245,166,35,.12);
      color: var(--warn);
      border: 1px solid rgba(245,166,35,.2);
    }
    .team-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .team-action-btn {
      height: 32px; padding: 0 10px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      transition: all .12s;
    }
    .team-action-btn:active { opacity: .7; }
    .team-action-btn.danger:active { color: var(--danger); border-color: var(--danger); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1px;
      border-radius: var(--r-md); overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .stat-cell {
      flex: 1; padding: 14px 16px;
      background: var(--bg-card);
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-cell + .stat-cell { border-left: 1px solid var(--border); }
    .stat-val {
      font-size: 24px; font-weight: 900; line-height: 1;
    }
    .stat-lbl {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Empty state ── */
    .teams-empty {
      padding: 32px 20px; text-align: center;
      color: var(--text-muted); font-size: 13px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      line-height: 1.6;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 18px;
      font-size: 13px; font-weight: 700;
      transition: transform .25s;
      pointer-events: none; white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- PIN screen -->
<div class="pin-root" id="pin-screen">
  <div class="pin-title">🔐 Admin</div>
  <div class="pin-sub">Acceso restringido</div>
  <div class="pin-card">
    <input class="pin-input" id="pin-input" type="password"
           maxlength="6" placeholder="••••••"
           inputmode="numeric"/>
    <div class="pin-error" id="pin-error"></div>
    <button class="pin-btn" id="pin-btn">Entrar</button>
  </div>
  <div class="pin-back" onclick="window.location.href='login.html'">
    ← Volver al inicio
  </div>
</div>

<!-- Admin panel -->
<div class="admin-root" id="admin-panel">

  <div class="admin-topbar">
    <div class="admin-topbar-title">PlaySync Admin</div>
    <span class="admin-topbar-badge">Admin</span>
    <button class="admin-logout-btn" id="admin-logout">Salir</button>
  </div>

  <div class="admin-content">

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Crear equipo -->
    <div class="admin-section">
      <div class="admin-section-title">Nuevo equipo</div>
      <div class="create-card">
        <div class="create-row">
          <input class="create-input" id="new-team-code"
                 type="text" placeholder="Código (ej. AZTEC-01)"
                 maxlength="20" autocomplete="off"
                 autocorrect="off" autocapitalize="characters"/>
          <button class="create-btn" id="btn-create">Crear</button>
        </div>
        <div class="create-error" id="create-error"></div>
        <div class="create-hint">
          El código es lo que el equipo usará para acceder.<br>
          Recomendado: NOMBRE-AÑO · Ej: BORR-2026
        </div>
      </div>
    </div>

    <!-- Lista de equipos -->
    <div class="admin-section">
      <div class="admin-section-title">Equipos registrados</div>
      <div class="teams-list" id="teams-list"></div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/teamConfig.js"></script>
<script>
'use strict';

// ── PIN ───────────────────────────────────────────────────────────────────
// Cambia este PIN por el tuyo
const ADMIN_PIN = '1234';

let adminUnlocked = false;

function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === ADMIN_PIN) {
    adminUnlocked = true;
    document.getElementById('pin-screen').style.display  = 'none';
    document.getElementById('admin-panel').classList.add('show');
    renderAdmin();
  } else {
    const input = document.getElementById('pin-input');
    const error = document.getElementById('pin-error');
    input.classList.add('error');
    error.textContent = 'PIN incorrecto';
    input.value = '';
    setTimeout(() => {
      input.classList.remove('error');
      error.textContent = '';
    }, 2000);
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTeamConfig(code) {
  try {
    const raw = localStorage.getItem(`${code}:playsync_team_config`);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function getTeamGames(code) {
  try {
    const raw = localStorage.getItem(`${code}:playsync_games`);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

// ── Render admin ──────────────────────────────────────────────────────────
function renderAdmin() {
  const teams = TeamConfig.getTeams();
  renderStats(teams);
  renderTeamsList(teams);
}

function renderStats(teams) {
  const configured = teams.filter(t => {
    const cfg = getTeamConfig(t.code);
    return cfg && cfg.configuredAt;
  }).length;

  const totalGames = teams.reduce((sum, t) => {
    return sum + getTeamGames(t.code).length;
  }, 0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-cell">
      <div class="stat-val">${teams.length}</div>
      <div class="stat-lbl">Equipos</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val">${configured}</div>
      <div class="stat-lbl">Configurados</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val">${totalGames}</div>
      <div class="stat-lbl">Partidos</div>
    </div>
  `;
}

function renderTeamsList(teams) {
  const el = document.getElementById('teams-list');

  if (!teams.length) {
    el.innerHTML = `
      <div class="teams-empty">
        Sin equipos registrados.<br>
        Crea el primero arriba.
      </div>`;
    return;
  }

  el.innerHTML = teams.map(t => {
    const cfg        = getTeamConfig(t.code);
    const name       = cfg?.name || '—';
    const color      = cfg?.color || '#444';
    const logo       = cfg?.logo || null;
    const configured = !!(cfg?.configuredAt);
    const games      = getTeamGames(t.code).length;

    const logoHTML = logo
      ? `<img src="${logo}" alt="${esc(t.code)}">`
      : `<span style="color:#fff;font-size:12px;font-weight:900;
                      background:${color};width:100%;height:100%;
                      display:flex;align-items:center;justify-content:center;
                      border-radius:8px;">
           ${esc(cfg?.initials || t.code.slice(0,2))}
         </span>`;

    return `
      <div class="team-row">
        <div class="team-row-logo">${logoHTML}</div>
        <div class="team-row-info">
          <div class="team-row-code">${esc(t.code)}</div>
          <div class="team-row-name">
            ${configured ? esc(name) : 'Sin configurar'}
            ${games ? ` · ${games} partido${games !== 1 ? 's' : ''}` : ''}
          </div>
        </div>
        <div class="team-row-badges">
          <span class="badge ${configured ? 'badge-configured' : 'badge-pending'}">
            ${configured ? 'Activo' : 'Pendiente'}
          </span>
        </div>
        <div class="team-row-actions">
          <button class="team-action-btn"
                  onclick="copyCode('${esc(t.code)}')"
                  title="Copiar código">
            📋
          </button>
          <button class="team-action-btn danger"
                  onclick="deleteTeam('${esc(t.code)}')"
                  title="Eliminar equipo">
            🗑
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// ── Acciones ──────────────────────────────────────────────────────────────
function createTeam() {
  const input = document.getElementById('new-team-code');
  const error = document.getElementById('create-error');
  const code  = input.value.trim().toUpperCase();

  error.textContent = '';

  if (!code) {
    error.textContent = 'Ingresa un código.';
    return;
  }
  if (code.length < 3) {
    error.textContent = 'Mínimo 3 caracteres.';
    return;
  }
  if (TeamConfig.teamExists(code)) {
    error.textContent = 'Ese código ya existe.';
    return;
  }

  TeamConfig.registerTeam(code);
  input.value = '';
  showToast(`Equipo ${code} creado ✓`);
  renderAdmin();
}

function deleteTeam(code) {
  const cfg   = getTeamConfig(code);
  const name  = cfg?.name || code;
  const games = getTeamGames(code).length;

  const msg = games > 0
    ? `¿Eliminar "${name}" (${code})?\n\nEsto borrará ${games} partido(s) y toda su data. Esta acción no se puede deshacer.`
    : `¿Eliminar el equipo "${name}" (${code})?`;

  if (!confirm(msg)) return;

  TeamConfig.removeTeam(code);
  showToast(`Equipo ${code} eliminado`);
  renderAdmin();
}

function copyCode(code) {
  navigator.clipboard.writeText(code)
    .then(() => showToast(`Código copiado: ${code}`))
    .catch(() => {
      // Fallback para Safari
      const el = document.createElement('textarea');
      el.value = code;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast(`Código copiado: ${code}`);
    });
}

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const pinInput = document.getElementById('pin-input');
  const pinBtn   = document.getElementById('pin-btn');

  pinInput.focus();
  pinBtn.addEventListener('click', checkPin);
  pinInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPin();
  });

  document.getElementById('admin-logout').addEventListener('click', () => {
    adminUnlocked = false;
    document.getElementById('admin-panel').classList.remove('show');
    document.getElementById('pin-screen').style.display = 'flex';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  });

  document.getElementById('btn-create').addEventListener('click', createTeam);
  document.getElementById('new-team-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTeam();
  });
  document.getElementById('new-team-code').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });
});
</script>
</body>
</html>
