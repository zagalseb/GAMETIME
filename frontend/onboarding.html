<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Configuración — PlaySync</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --bg-panel:  #141416;
      --bg-card:   #1c1c1f;
      --bg-item:   #242428;
      --border:    rgba(255,255,255,.08);
      --text:      #f0f0f2;
      --text-sec:  #a0a0a8;
      --text-muted:#606068;
      --accent:    #00C896;
      --r-sm:      6px;
      --r-md:      10px;
      --r-lg:      16px;
      --font:      -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: var(--font);
    }

    button { cursor: pointer; border: none; background: none;
             font-family: var(--font); color: var(--text); }
    input, textarea { font-family: var(--font); }

    /* ── Layout ── */
    .ob-root {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 540px;
      margin: 0 auto; padding: 0 20px;
    }

    /* ── Progress bar ── */
    .ob-progress {
      padding: 16px 0 0;
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .ob-prog-seg {
      flex: 1; height: 3px;
      background: var(--bg-item);
      border-radius: 99px;
      transition: background .3s;
    }
    .ob-prog-seg.done   { background: var(--accent); }
    .ob-prog-seg.active { background: var(--accent); opacity: .5; }

    /* ── Header ── */
    .ob-header {
      padding: 24px 0 8px;
      flex-shrink: 0;
    }
    .ob-step-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px;
    }
    .ob-title {
      font-size: 26px; font-weight: 900;
      line-height: 1.15; letter-spacing: -.3px;
    }
    .ob-subtitle {
      font-size: 14px; color: var(--text-sec);
      margin-top: 6px; line-height: 1.5;
    }

    /* ── Content ── */
    .ob-content {
      flex: 1; overflow-y: auto;
      padding: 20px 0 8px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Footer nav ── */
    .ob-footer {
      padding: 12px 0 28px;
      display: flex; gap: 10px; flex-shrink: 0;
    }
    .ob-btn-next {
      flex: 1; height: 52px;
      background: var(--accent); color: #000;
      font-size: 15px; font-weight: 800;
      border-radius: var(--r-md);
      transition: opacity .15s;
    }
    .ob-btn-next:active { opacity: .8; }
    .ob-btn-back {
      width: 52px; height: 52px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .ob-btn-skip {
      height: 52px; padding: 0 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-muted);
      font-size: 13px; font-weight: 600;
    }

    /* ── Form elements ── */
    .ob-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .ob-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .ob-input {
      height: 48px; padding: 0 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text); font-size: 15px;
      font-family: var(--font);
      transition: border-color .15s;
    }
    .ob-input:focus {
      outline: none; border-color: var(--accent);
    }
    .ob-input.error { border-color: #e53935; }

    .ob-error {
      font-size: 12px; color: #e53935;
      display: none;
    }
    .ob-error.show { display: block; }

    /* ── Color palette ── */
    .ob-palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }
    .ob-color-chip {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: transform .15s, border-color .15s;
      position: relative;
    }
    .ob-color-chip:active { transform: scale(.9); }
    .ob-color-chip.selected {
      border-color: #fff;
      transform: scale(1.1);
    }
    .ob-color-chip.selected::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
    }

    /* ── Logo upload ── */
    .ob-logo-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    .ob-logo-preview {
      width: 100px; height: 100px;
      border-radius: var(--r-md);
      background: var(--bg-card);
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900;
      color: var(--text-muted);
      overflow: hidden;
      transition: border-color .2s;
    }
    .ob-logo-preview img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .ob-logo-preview.has-logo {
      border-style: solid; border-color: var(--accent);
    }
    .ob-logo-btns { display: flex; gap: 8px; }
    .ob-logo-upload-btn {
      height: 40px; padding: 0 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px; font-weight: 700;
      color: var(--text-sec);
    }
    .ob-logo-clear-btn {
      height: 40px; padding: 0 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px; color: var(--text-muted);
    }
    #ob-logo-file { display: none; }
    .ob-logo-hint {
      font-size: 12px; color: var(--text-muted);
      text-align: center; line-height: 1.5;
    }

    /* ── Formation chips (step 4) ── */
    .ob-formations-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .ob-form-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
    }
    .ob-form-name {
      flex: 1; font-size: 14px; font-weight: 600;
    }
    .ob-form-del {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 16px;
      border-radius: var(--r-sm);
      transition: color .15s;
    }
    .ob-form-del:active { color: #e53935; }
    .ob-add-form-row {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .ob-add-form-input {
      flex: 1; height: 40px; padding: 0 12px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text); font-size: 13px;
    }
    .ob-add-form-input:focus { outline: none; border-color: var(--accent); }
    .ob-add-form-btn {
      height: 40px; padding: 0 16px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px; font-weight: 700;
      color: var(--accent);
    }

    /* ── Roster step ── */
    .ob-roster-zone {
      border: 2px dashed var(--border);
      border-radius: var(--r-md);
      padding: 32px 20px;
      text-align: center;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .ob-roster-zone.has-data { border-color: var(--accent); border-style: solid; }
    .ob-roster-icon { font-size: 32px; margin-bottom: 8px; }
    .ob-roster-label {
      font-size: 14px; font-weight: 700;
      margin-bottom: 4px;
    }
    .ob-roster-hint {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
      margin-bottom: 14px;
    }
    .ob-roster-upload-btn {
      height: 40px; padding: 0 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px; font-weight: 700;
      color: var(--text-sec);
    }
    #ob-roster-file { display: none; }
    .ob-roster-count {
      font-size: 13px; color: var(--accent);
      font-weight: 700; margin-top: 8px;
    }

    /* ── Summary (step 6) ── */
    .ob-summary-logo {
      width: 80px; height: 80px;
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .ob-summary-logo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .ob-summary-grid {
      display: flex; flex-direction: column; gap: 1px;
      border-radius: var(--r-md); overflow: hidden;
      border: 1px solid var(--border);
    }
    .ob-summary-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--bg-card);
    }
    .ob-summary-row + .ob-summary-row {
      border-top: 1px solid var(--border);
    }
    .ob-summary-key {
      font-size: 12px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .05em;
      text-transform: uppercase;
    }
    .ob-summary-val {
      font-size: 14px; font-weight: 700;
      color: var(--text);
    }
    .ob-summary-color-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
    .ob-welcome {
      text-align: center; padding: 8px 0 16px;
    }
    .ob-welcome-emoji { font-size: 48px; margin-bottom: 8px; }
    .ob-welcome-text {
      font-size: 15px; color: var(--text-sec);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="ob-root">

  <!-- Progress -->
  <div class="ob-progress" id="ob-progress"></div>

  <!-- Header -->
  <div class="ob-header">
    <div class="ob-step-label" id="ob-step-label"></div>
    <div class="ob-title"     id="ob-title"></div>
    <div class="ob-subtitle"  id="ob-subtitle"></div>
  </div>

  <!-- Content -->
  <div class="ob-content" id="ob-content"></div>

  <!-- Footer -->
  <div class="ob-footer" id="ob-footer"></div>

</div>

<script src="js/teamConfig.js"></script>
<script src="js/data.js"></script>
<script>
'use strict';

// ── Paleta de colores ─────────────────────────────────────────────────────
const PALETTE = [
  { hex: '#00C896', name: 'Esmeralda'  },
  { hex: '#1E88E5', name: 'Azul Royal' },
  { hex: '#E53935', name: 'Carmín'     },
  { hex: '#F57C00', name: 'Naranja'    },
  { hex: '#8E24AA', name: 'Morado'     },
  { hex: '#F5C518', name: 'Dorado'     },
  { hex: '#00ACC1', name: 'Cian'       },
  { hex: '#7CB342', name: 'Lima'       },
  { hex: '#D81B60', name: 'Rosa'       },
  { hex: '#1565C0', name: 'Marino'     },
  { hex: '#757575', name: 'Plata'      },
  { hex: '#E0E0E0', name: 'Blanco'     },
];

// ── Estado del wizard ─────────────────────────────────────────────────────
const WS = {
  step:       1,
  totalSteps: 6,
  name:       '',
  initials:   '',
  color:      '#00C896',
  logo:       null,
  formations: [],
  roster:     [],
};

// Cargar formaciones default de data.js
function loadDefaultFormations() {
  try {
    const saved = localStorage.getItem(TeamConfig.key('playsync_playbook_own_off'));
    const pb    = saved ? JSON.parse(saved) : PLAYBOOK;
    WS.formations = (pb.formations || PLAYBOOK.formations)
      .map(f => ({ id: f.id, name: f.name }));
  } catch {
    WS.formations = PLAYBOOK.formations.map(f => ({ id: f.id, name: f.name }));
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function contrastColor(hex) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#000' : '#fff';
}

function autoInitials(name) {
  const words = name.trim().split(/\s+/).filter(Boolean);
  if (!words.length) return '';
  if (words.length === 1) return words[0].slice(0,2).toUpperCase();
  return (words[0][0] + words[words.length-1][0]).toUpperCase();
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch==='"' && line[i+1]==='"') { cur+='"'; i++; }
      else if (ch==='"') { inQ=false; }
      else { cur+=ch; }
    } else {
      if (ch==='"') { inQ=true; }
      else if (ch===',') { result.push(cur); cur=''; }
      else { cur+=ch; }
    }
  }
  result.push(cur);
  return result;
}

// ── Progress bar ──────────────────────────────────────────────────────────
function renderProgress() {
  const el = document.getElementById('ob-progress');
  el.innerHTML = Array.from({ length: WS.totalSteps }, (_, i) => {
    const cls = i + 1 < WS.step ? 'done' : i + 1 === WS.step ? 'active' : '';
    return `<div class="ob-prog-seg ${cls}"></div>`;
  }).join('');
}

// ── Step definitions ──────────────────────────────────────────────────────
const STEPS = [
  {
    label:    'Paso 1 de 6',
    title:    'Nombre del equipo',
    subtitle: 'Cómo aparecerá tu equipo en la app.',
    render() {
      return `
        <div class="ob-field">
          <label class="ob-label">Nombre del equipo</label>
          <input class="ob-input" id="ob-name" type="text"
                 placeholder="Ej: Borregos, Aztecas, Pumas"
                 maxlength="30" value="${esc(WS.name)}" autocomplete="off"/>
          <div class="ob-error" id="ob-name-error">Ingresa el nombre del equipo</div>
        </div>
        <div class="ob-field">
          <label class="ob-label">Iniciales (para el logo si no subes imagen)</label>
          <input class="ob-input" id="ob-initials" type="text"
                 placeholder="Ej: BOR, AZT"
                 maxlength="3" value="${esc(WS.initials)}" autocomplete="off"/>
          <div class="ob-error" id="ob-initials-error">Máximo 3 caracteres</div>
        </div>
      `;
    },
    onMount() {
      const nameEl = document.getElementById('ob-name');
      const initEl = document.getElementById('ob-initials');
      nameEl.focus();
      nameEl.addEventListener('input', () => {
        WS.name = nameEl.value;
        // Auto-sugerir iniciales si el campo está vacío o no fue editado
        if (!initEl.dataset.manual) {
          initEl.value = autoInitials(nameEl.value);
          WS.initials  = initEl.value;
        }
      });
      initEl.addEventListener('input', () => {
        initEl.dataset.manual = 'true';
        WS.initials = initEl.value.toUpperCase();
        initEl.value = WS.initials;
      });
    },
    validate() {
      let ok = true;
      if (!WS.name.trim()) {
        document.getElementById('ob-name-error').classList.add('show');
        document.getElementById('ob-name').classList.add('error');
        ok = false;
      }
      return ok;
    },
  },
  {
    label:    'Paso 2 de 6',
    title:    'Color del equipo',
    subtitle: 'Se usará como color de acento en toda la app.',
    render() {
      return `
        <div class="ob-palette" id="ob-palette">
          ${PALETTE.map(c => `
            <button class="ob-color-chip ${c.hex === WS.color ? 'selected' : ''}"
                    data-hex="${c.hex}"
                    style="background:${c.hex};--chip-contrast:${contrastColor(c.hex)}"
                    title="${c.name}">
            </button>
          `).join('')}
        </div>
        <div style="margin-top:20px;padding:14px;background:var(--bg-card);
                    border-radius:var(--r-md);border:1px solid var(--border);">
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);
                      text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">
            Vista previa
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="ob-preview-icon"
                 style="width:36px;height:36px;border-radius:8px;
                        display:flex;align-items:center;justify-content:center;
                        font-size:13px;font-weight:900;
                        background:${WS.color};color:${contrastColor(WS.color)}">
              ${esc(WS.initials || WS.name.slice(0,2).toUpperCase())}
            </div>
            <div style="font-size:14px;font-weight:700;" id="ob-preview-name">
              ${esc(WS.name || 'Mi Equipo')}
            </div>
          </div>
        </div>
      `;
    },
    onMount() {
      document.getElementById('ob-palette').addEventListener('click', e => {
        const chip = e.target.closest('.ob-color-chip');
        if (!chip) return;
        WS.color = chip.dataset.hex;
        document.querySelectorAll('.ob-color-chip')
          .forEach(c => c.classList.toggle('selected', c.dataset.hex === WS.color));
        // Actualizar preview
        const icon = document.getElementById('ob-preview-icon');
        icon.style.background = WS.color;
        icon.style.color      = contrastColor(WS.color);
        // Actualizar CSS var en tiempo real
        document.documentElement.style.setProperty('--accent', WS.color);
      });
    },
    validate() { return true; },
  },
  {
    label:    'Paso 3 de 6',
    title:    'Logo del equipo',
    subtitle: 'Opcional — aparece en el topbar de toda la app.',
    render() {
      const hasLogo = !!WS.logo;
      return `
        <div class="ob-logo-wrap">
          <div class="ob-logo-preview ${hasLogo ? 'has-logo' : ''}" id="ob-logo-preview"
               style="${hasLogo ? `border-color:${WS.color}` : ''}">
            ${hasLogo
              ? `<img src="${WS.logo}" alt="Logo">`
              : `<span style="color:var(--text-muted);font-size:13px;font-weight:700;">
                   ${esc(WS.initials || '?')}
                 </span>`
            }
          </div>
          <div class="ob-logo-btns">
            <button class="ob-logo-upload-btn" id="ob-logo-upload-btn">
              📁 Subir imagen
            </button>
            ${hasLogo
              ? `<button class="ob-logo-clear-btn" id="ob-logo-clear-btn">✕ Quitar</button>`
              : ''}
          </div>
          <input type="file" id="ob-logo-file" accept="image/png,image/jpeg,image/webp,image/svg+xml">
          <div class="ob-logo-hint">
            PNG, JPG o SVG · Recomendado: cuadrado<br>
            Si no subes logo, se usarán tus iniciales
          </div>
        </div>
      `;
    },
    onMount() {
      document.getElementById('ob-logo-upload-btn').addEventListener('click', () => {
        document.getElementById('ob-logo-file').click();
      });
      document.getElementById('ob-logo-file').addEventListener('change', e => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          WS.logo = ev.target.result;
          renderStep();
        };
        reader.readAsDataURL(file);
      });
      document.getElementById('ob-logo-clear-btn')?.addEventListener('click', () => {
        WS.logo = null;
        renderStep();
      });
    },
    validate() { return true; },
  },
  {
    label:    'Paso 4 de 6',
    title:    'Formaciones ofensivas',
    subtitle: 'Estas son tus formaciones base. Puedes editarlas en detalle desde PLAYBOOK.',
    render() {
      return `
        <div class="ob-formations-list" id="ob-formations-list">
          ${WS.formations.map((f, i) => `
            <div class="ob-form-row" data-idx="${i}">
              <span class="ob-form-name">${esc(f.name)}</span>
              <button class="ob-form-del" data-idx="${i}" title="Eliminar">✕</button>
            </div>
          `).join('')}
        </div>
        <div class="ob-add-form-row">
          <input class="ob-add-form-input" id="ob-add-form-input"
                 type="text" placeholder="Nueva formación..." maxlength="30"/>
          <button class="ob-add-form-btn" id="ob-add-form-btn">+ Agregar</button>
        </div>
      `;
    },
    onMount() {
      document.getElementById('ob-formations-list').addEventListener('click', e => {
        const btn = e.target.closest('.ob-form-del');
        if (!btn) return;
        const idx = parseInt(btn.dataset.idx);
        WS.formations.splice(idx, 1);
        renderStep();
      });

      const addInput = document.getElementById('ob-add-form-input');
      const addBtn   = document.getElementById('ob-add-form-btn');

      function addFormation() {
        const v = addInput.value.trim();
        if (!v) return;
        WS.formations.push({ id: 'custom-' + Date.now(), name: v });
        addInput.value = '';
        renderStep();
      }

      addBtn.addEventListener('click', addFormation);
      addInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') addFormation();
      });
    },
    validate() {
      if (!WS.formations.length) {
        alert('Agrega al menos una formación.');
        return false;
      }
      return true;
    },
  },
  {
    label:    'Paso 5 de 6',
    title:    'Roster',
    subtitle: 'Importa tu plantilla de jugadores. Puedes hacerlo después.',
    render() {
      const hasRoster = WS.roster.length > 0;
      return `
        <div class="ob-roster-zone ${hasRoster ? 'has-data' : ''}" id="ob-roster-zone">
          <div class="ob-roster-icon">${hasRoster ? '✅' : '👥'}</div>
          <div class="ob-roster-label">
            ${hasRoster ? `${WS.roster.length} jugadores importados` : 'Sin roster todavía'}
          </div>
          <div class="ob-roster-hint">
            Formato CSV: #, Nombre, Posición, Unidad<br>
            Ej: 7, Carlos Ramos, QB, OFE
          </div>
          <button class="ob-roster-upload-btn" id="ob-roster-upload-btn">
            📁 Importar CSV
          </button>
          <input type="file" id="ob-roster-file" accept=".csv,text/csv">
        </div>
        ${hasRoster ? `
          <div style="background:var(--bg-card);border:1px solid var(--border);
                      border-radius:var(--r-md);overflow:hidden;max-height:200px;overflow-y:auto;">
            ${WS.roster.slice(0,10).map(p => `
              <div style="display:flex;gap:10px;align-items:center;
                          padding:10px 14px;border-bottom:1px solid var(--border);
                          font-size:13px;">
                <span style="font-weight:800;color:var(--accent);min-width:28px;">#${esc(p.number)}</span>
                <span style="flex:1;font-weight:600;">${esc(p.name)}</span>
                <span style="color:var(--text-muted);font-size:11px;">${esc(p.position)} · ${esc(p.unit)}</span>
              </div>
            `).join('')}
            ${WS.roster.length > 10
              ? `<div style="padding:8px 14px;font-size:12px;color:var(--text-muted);">
                   +${WS.roster.length - 10} más
                 </div>`
              : ''}
          </div>
        ` : ''}
      `;
    },
    onMount() {
      document.getElementById('ob-roster-upload-btn').addEventListener('click', () => {
        document.getElementById('ob-roster-file').click();
      });
      document.getElementById('ob-roster-file').addEventListener('change', e => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          let text = ev.target.result;
          if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
          WS.roster = parseRosterFromCSV(text);
          renderStep();
        };
        reader.readAsText(file, 'UTF-8');
      });
    },
    validate() { return true; },
  },
  {
    label:    'Paso 6 de 6',
    title:    '¡Todo listo!',
    subtitle: 'Así quedó tu configuración. Puedes cambiarla en cualquier momento.',
    render() {
      const logoHTML = WS.logo
        ? `<img src="${WS.logo}" alt="Logo">`
        : `<span style="color:${contrastColor(WS.color)}">
             ${esc(WS.initials || WS.name.slice(0,2).toUpperCase())}
           </span>`;
      return `
        <div class="ob-welcome">
          <div class="ob-summary-logo"
               style="background:${WS.color};">${logoHTML}</div>
        </div>
        <div class="ob-summary-grid">
          <div class="ob-summary-row">
            <span class="ob-summary-key">Equipo</span>
            <span class="ob-summary-val">${esc(WS.name)}</span>
          </div>
          <div class="ob-summary-row">
            <span class="ob-summary-key">Color</span>
            <span class="ob-summary-val">
              <span class="ob-summary-color-dot" style="background:${WS.color}"></span>
              ${PALETTE.find(c => c.hex === WS.color)?.name || WS.color}
            </span>
          </div>
          <div class="ob-summary-row">
            <span class="ob-summary-key">Logo</span>
            <span class="ob-summary-val">${WS.logo ? 'Subido ✓' : 'Iniciales: ' + esc(WS.initials)}</span>
          </div>
          <div class="ob-summary-row">
            <span class="ob-summary-key">Formaciones</span>
            <span class="ob-summary-val">${WS.formations.length} formaciones</span>
          </div>
          <div class="ob-summary-row">
            <span class="ob-summary-key">Roster</span>
            <span class="ob-summary-val">
              ${WS.roster.length > 0 ? WS.roster.length + ' jugadores' : 'Por configurar'}
            </span>
          </div>
        </div>
      `;
    },
    onMount() {},
    validate() { return true; },
  },
];

// ── CSV parser para roster ────────────────────────────────────────────────
function parseRosterFromCSV(text) {
  const players = [];
  const lines   = text.split('\n').map(l => l.trim()).filter(Boolean);
  for (const line of lines) {
    const cols = parseCSVLine(line);
    if (!cols[0] || cols[0] === '#') continue;
    const [number, name, position, unit] = cols.map(c => c.trim());
    if (!name) continue;
    const validUnit = ['OFE','DEF','ST'].includes(unit) ? unit : 'OFE';
    players.push({
      id:       Date.now().toString(36) + Math.random().toString(36).slice(2),
      number:   number || '0',
      name,
      position: position || '',
      unit:     validUnit,
    });
  }
  return players;
}

// ── Render step ───────────────────────────────────────────────────────────
function renderStep() {
  const step = STEPS[WS.step - 1];

  // Header
  document.getElementById('ob-step-label').textContent = step.label;
  document.getElementById('ob-title').textContent      = step.title;
  document.getElementById('ob-subtitle').textContent   = step.subtitle;

  // Content
  document.getElementById('ob-content').innerHTML = step.render();
  step.onMount();

  // Progress
  renderProgress();

  // Footer
  const isLast   = WS.step === WS.totalSteps;
  const isFirst  = WS.step === 1;
  const isRoster = WS.step === 5;

  document.getElementById('ob-footer').innerHTML = `
    ${!isFirst ? `<button class="ob-btn-back" id="ob-btn-back">←</button>` : ''}
    ${isRoster ? `<button class="ob-btn-skip" id="ob-btn-skip">Saltar</button>` : ''}
    <button class="ob-btn-next" id="ob-btn-next"
            style="background:${WS.color};color:${contrastColor(WS.color)}">
      ${isLast ? '🏈 Entrar a PlaySync' : 'Siguiente →'}
    </button>
  `;

  document.getElementById('ob-btn-next').addEventListener('click', nextStep);
  document.getElementById('ob-btn-back')?.addEventListener('click', prevStep);
  document.getElementById('ob-btn-skip')?.addEventListener('click', () => {
    WS.step++;
    renderStep();
  });
}

// ── Navegación ────────────────────────────────────────────────────────────
function nextStep() {
  const step = STEPS[WS.step - 1];
  if (!step.validate()) return;

  if (WS.step === WS.totalSteps) {
    saveAndFinish();
    return;
  }

  WS.step++;
  renderStep();
  document.getElementById('ob-content').scrollTop = 0;
}

function prevStep() {
  if (WS.step <= 1) return;
  WS.step--;
  renderStep();
  document.getElementById('ob-content').scrollTop = 0;
}

// ── Guardar y finalizar ───────────────────────────────────────────────────
function saveAndFinish() {
  // 1. Guardar team config
  TeamConfig.set({
    name:        WS.name.trim(),
    initials:    WS.initials.trim() || autoInitials(WS.name),
    color:       WS.color,
    logo:        WS.logo,
    configuredAt: new Date().toISOString(),
  });

  // 2. Aplicar formaciones al playbook OWN OFF
  try {
    const saved = localStorage.getItem(TeamConfig.key('playsync_playbook_own_off'));
    const pb    = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(PLAYBOOK));
    pb.formations = WS.formations;
    // Limpiar plays de formaciones eliminadas
    const validIds = new Set(WS.formations.map(f => f.id));
    Object.keys(pb.plays || {}).forEach(k => {
      if (!validIds.has(k)) delete pb.plays[k];
    });
    // Asegurar que cada formación tenga al menos un array vacío
    WS.formations.forEach(f => {
      if (!pb.plays[f.id]) pb.plays[f.id] = [];
    });
    localStorage.setItem(TeamConfig.key('playsync_playbook_own_off'), JSON.stringify(pb));
  } catch (e) {
    console.warn('Error saving playbook:', e);
  }

  // 3. Guardar roster si hay jugadores
  if (WS.roster.length > 0) {
    localStorage.setItem(TeamConfig.key('pp_roster'), JSON.stringify(WS.roster));
  }

  // 4. Redirigir
  window.location.href = 'index.html';
}

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!TeamConfig.requireTeam()) return;

  // Si ya está configurado, ir al hub
  if (TeamConfig.isConfigured()) {
    window.location.href = 'index.html';
    return;
  }

  loadDefaultFormations();
  document.documentElement.style.setProperty('--accent', WS.color);
  renderStep();
});
</script>
</body>
